<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lockwood STEM | Daily Agenda</title>

<style>
:root {
  --dark: #101827;
  --text: #1f2937;
  --muted: #667085;
  --light: #f5f5f5;
  --shadow: 0 14px 34px rgba(0, 51, 153, 0.13);
  --soft: 0 8px 22px rgba(17, 24, 39, 0.07);

  --course-primary: #003399;
  --course-secondary: #0054c8;
  --course-accent: #33cc66;
  --course-soft: rgba(0, 51, 153, 0.13);
}

body.theme-ied {
  --course-primary: #003399;
  --course-secondary: #0054c8;
  --course-accent: #33cc66;
  --course-soft: rgba(0, 51, 153, 0.13);
}

body.theme-poe {
  --course-primary: #166534;
  --course-secondary: #33cc66;
  --course-accent: #ffcc00;
  --course-soft: rgba(51, 204, 102, 0.16);
}

body.theme-am {
  --course-primary: #b45309;
  --course-secondary: #f59e0b;
  --course-accent: #003399;
  --course-soft: rgba(245, 158, 11, 0.18);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at top left, var(--course-soft), transparent 26%),
    radial-gradient(circle at top right, rgba(0, 51, 153, 0.10), transparent 28%),
    linear-gradient(180deg, #ffffff 0%, #f6f9ff 58%, var(--light) 100%);
  min-height: 100vh;
  overflow: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0, 51, 153, 0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 51, 153, 0.035) 1px, transparent 1px);
  background-size: 42px 42px;
  pointer-events: none;
  z-index: -1;
  mask-image: linear-gradient(to bottom, rgba(0,0,0,0.65), transparent 78%);
}

.page {
  width: 100vw;
  max-width: none;
  height: 100vh;
  margin: 0;
  padding: 6px;
  display: grid;
  grid-template-rows: auto 1fr;
  gap: 6px;
}

.hero {
  border-radius: 16px;
  padding: 10px 14px;
  background:
    linear-gradient(135deg, rgba(255,255,255,.88), rgba(255,255,255,.62)),
    radial-gradient(circle at 86% 14%, var(--course-soft), transparent 24%),
    radial-gradient(circle at 12% 18%, rgba(255,204,0,.16), transparent 22%);
  border: 1px solid rgba(255,255,255,.9);
  box-shadow: var(--shadow);
}

.hero-top {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 16px;
  align-items: center;
}

.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 6px 10px;
  border-radius: 999px;
  background: rgba(255,255,255,.78);
  border: 1px solid var(--course-soft);
  color: var(--course-primary);
  font-size: .74rem;
  font-weight: 900;
  box-shadow: 0 6px 14px rgba(17,24,39,.05);
  margin-bottom: 6px;
  white-space: nowrap;
}

.spark {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--course-accent);
  box-shadow: 0 0 0 4px var(--course-soft);
}

h1 {
  font-size: clamp(2rem, 4vw, 3.35rem);
  line-height: .9;
  letter-spacing: -.075em;
  color: var(--dark);
  margin: 0;
  white-space: nowrap;
}

h1 span { color: var(--course-primary); }

.subtitle {
  color: var(--muted);
  font-size: .9rem;
  line-height: 1.25;
  margin: 3px 0 0;
}

.controls {
  display: grid;
  grid-template-columns: minmax(180px, 1fr) 150px auto auto auto;
  gap: 8px;
  align-items: end;
}

.select-wrap,
.date-wrap {
  background: rgba(255,255,255,.88);
  border: 1px solid rgba(255,255,255,.92);
  border-radius: 14px;
  padding: 6px 9px;
  box-shadow: var(--soft);
}

label {
  display: block;
  color: var(--muted);
  font-size: .62rem;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: .05em;
  margin-bottom: 2px;
}

select,
input[type="date"] {
  width: 100%;
  border: none;
  outline: none;
  background: transparent;
  color: var(--dark);
  font-size: .85rem;
  font-weight: 800;
}

button {
  cursor: pointer;
  border: none;
  border-radius: 999px;
  padding: 10px 12px;
  font-size: .82rem;
  font-weight: 900;
  background: white;
  color: var(--course-primary);
  box-shadow: var(--soft);
  white-space: nowrap;
}

button.primary {
  background: linear-gradient(135deg, var(--course-primary), var(--course-secondary));
  color: white;
}

.status-row {
  display: grid;
  grid-template-columns: 1.15fr .75fr 1.1fr;
  gap: 8px;
  margin-top: 10px;
}

.badge {
  display: flex;
  align-items: center;
  gap: 7px;
  min-width: 0;
  border-radius: 999px;
  padding: 7px 10px;
  background: rgba(255,255,255,.78);
  border: 1px solid rgba(255,255,255,.86);
  font-size: .78rem;
  font-weight: 900;
  color: var(--dark);
  box-shadow: 0 6px 14px rgba(17,24,39,.04);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.badge::before {
  content: "";
  flex: 0 0 auto;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--course-accent);
  box-shadow: 0 0 0 3px var(--course-soft);
}

.main-grid {
  min-height: 0;
  height: 100%;
  display: grid;
  grid-template-columns: 1.2fr .8fr;
  gap: 6px;
}

.card {
  min-height: 0;
  background: rgba(255,255,255,.88);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,.9);
  border-radius: 14px;
  box-shadow: var(--soft);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.card-header {
  flex: 0 0 auto;
  padding: 8px 12px;
  background: linear-gradient(135deg, var(--course-primary), var(--course-secondary));
  color: white;
  display: flex;
  justify-content: space-between;
  gap: 10px;
  align-items: center;
}

.card-header.green {
  background: linear-gradient(135deg, var(--course-accent), var(--course-secondary));
  color: #07111f;
}

.card-header.yellow {
  background: linear-gradient(135deg, #ffcc00, #f2b400);
  color: #211800;
}

.card-header.quote-header {
  background:
    radial-gradient(circle at 12% 20%, rgba(255,255,255,.25), transparent 30%),
    linear-gradient(135deg, var(--course-primary), var(--course-secondary));
}

.card h2,
.card h3 {
  margin: 0;
  letter-spacing: -.03em;
  font-size: 1rem;
}

.card-header span {
  font-size: .75rem;
  font-weight: 800;
  opacity: .95;
  white-space: nowrap;
}

.card-body {
  min-height: 0;
  padding: 8px;
  overflow: hidden;
}

.agenda-card {
  height: 100%;
}

.agenda-card .card-body {
  display: grid;
}

.meta-table {
  min-height: 0;
  display: grid;
  grid-template-rows: auto auto auto minmax(90px, 1fr) auto;
  gap: 5px;
}

.meta-row {
  min-height: 0;
  display: grid;
  grid-template-columns: 88px 1fr;
  gap: 8px;
  padding: 7px 8px;
  border-radius: 10px;
  background: var(--course-soft);
  overflow: hidden;
}

.meta-row.agenda-row {
  min-height: 0;
}

.meta-label {
  color: var(--course-primary);
  font-weight: 900;
  font-size: .8rem;
}

.meta-value {
  color: var(--dark);
  font-weight: 800;
  font-size: .86rem;
  overflow: hidden;
  text-overflow: ellipsis;
}

.content-text {
  white-space: pre-wrap;
  color: var(--text);
  font-size: .86rem;
  line-height: 1.3;
}

.quote-text {
  color: var(--dark);
  font-size: .92rem;
  line-height: 1.35;
  font-weight: 800;
  letter-spacing: -.015em;
  position: relative;
  padding-left: 18px;
}

.quote-text::before {
  content: "“";
  position: absolute;
  left: 0;
  top: -7px;
  color: var(--course-primary);
  font-size: 1.9rem;
  line-height: 1;
}

.agenda-list {
  margin: 0;
  padding-left: 17px;
  font-size: .86rem;
  line-height: 1.25;
}

.agenda-list li { margin: 3px 0; }

.left-stack,
.side-grid {
  min-height: 0;
  display: grid;
  gap: 6px;
}

.left-stack {
  grid-template-rows: 64% 36%;
}

.side-grid {
  grid-template-rows: .8fr 1.15fr .8fr;
}

.side-grid .card-body {
  overflow: hidden;
}

.empty {
  color: var(--muted);
  font-style: italic;
  font-size: .86rem;
}

.loading {
  padding: 24px;
  text-align: center;
  color: var(--muted);
  font-weight: 900;
}

.fade { animation: fadeIn .25s ease; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

@media(max-width: 900px) {
  body { overflow: auto; }

  .page {
    height: auto;
    min-height: 100vh;
  }

  .hero-top,
  .controls,
  .main-grid,
  .status-row {
    grid-template-columns: 1fr;
  }

  h1 { white-space: normal; }

  .side-grid {
    grid-template-rows: none;
  }

  .card-body { overflow: visible; }
}

@media(max-width: 600px) {
  .page { padding: 10px; }
  .hero { padding: 12px; }
  button { width: 100%; }
  .meta-row { grid-template-columns: 1fr; }
}
</style>
<style id="lockwood-anchor-fix">
html { scroll-behavior: smooth; }
[id] { scroll-margin-top: 110px; }
</style>
</head>

<body class="theme-ied">
<div class="page">
  <section class="hero">
    <div class="hero-top">
      <div>
        <div class="eyebrow"><span class="spark"></span> Lockwood STEM</div>
        <h1>Daily <span>Agenda</span></h1>
        <p class="subtitle">Select your course, move between dates, and check what you need to complete today.</p>
      </div>

      <div class="controls">
        <div class="select-wrap">
          <label for="courseSelect">Course</label>
          <select id="courseSelect">
            <option value="IED">IED</option>
            <option value="POE">POE</option>
            <option value="AM">Advanced Manufacturing</option>
          </select>
        </div>

        <div class="date-wrap">
          <label for="datePicker">Date</label>
          <input id="datePicker" type="date" />
        </div>

        <button id="prevBtn">◀ Previous</button>
        <button id="todayBtn" class="primary">Today</button>
        <button id="nextBtn">Next ▶</button>
      </div>
    </div>

    <div class="status-row">
      <div class="badge" id="dateBadge">Loading date...</div>
      <div class="badge" id="courseBadge">Loading course...</div>
      <div class="badge" id="lessonBadge">Loading lesson...</div>
    </div>
  </section>

  <div id="app" class="loading">Loading agenda...</div>
</div>

<script>
const csvUrls = {
  IED: "https://docs.google.com/spreadsheets/d/e/2PACX-1vS4L3J5287xZ94Awc47kSrjAKOUIenbvYYlt15zdUAM4oL7Z_nVNegZ8M84JiKfrCr2x4FATCDS81Ng/pub?gid=1181780759&single=true&output=csv",
  POE: "https://docs.google.com/spreadsheets/d/e/2PACX-1vS4L3J5287xZ94Awc47kSrjAKOUIenbvYYlt15zdUAM4oL7Z_nVNegZ8M84JiKfrCr2x4FATCDS81Ng/pub?gid=94192821&single=true&output=csv",
  AM: "https://docs.google.com/spreadsheets/d/e/2PACX-1vS4L3J5287xZ94Awc47kSrjAKOUIenbvYYlt15zdUAM4oL7Z_nVNegZ8M84JiKfrCr2x4FATCDS81Ng/pub?gid=646728293&single=true&output=csv"
};

const quotesCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS4L3J5287xZ94Awc47kSrjAKOUIenbvYYlt15zdUAM4oL7Z_nVNegZ8M84JiKfrCr2x4FATCDS81Ng/pub?gid=1284674718&single=true&output=csv";

let rows = [];
let quoteRows = [];
let currentCourse = "IED";
let currentDate = "";

const els = {
  app: document.getElementById("app"),
  courseSelect: document.getElementById("courseSelect"),
  datePicker: document.getElementById("datePicker"),
  prevBtn: document.getElementById("prevBtn"),
  todayBtn: document.getElementById("todayBtn"),
  nextBtn: document.getElementById("nextBtn"),
  dateBadge: document.getElementById("dateBadge"),
  courseBadge: document.getElementById("courseBadge"),
  lessonBadge: document.getElementById("lessonBadge")
};

function setTheme(course) {
  document.body.classList.remove("theme-ied", "theme-poe", "theme-am");

  if (course === "POE") document.body.classList.add("theme-poe");
  else if (course === "AM") document.body.classList.add("theme-am");
  else document.body.classList.add("theme-ied");
}

function courseName(course) {
  if (course === "AM") return "Advanced Manufacturing";
  return course;
}

function parseCSV(text) {
  const result = [];
  let row = [];
  let field = "";
  let inQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const char = text[i];
    const next = text[i + 1];

    if (char === '"' && inQuotes && next === '"') {
      field += '"';
      i++;
    } else if (char === '"') {
      inQuotes = !inQuotes;
    } else if (char === "," && !inQuotes) {
      row.push(field);
      field = "";
    } else if ((char === "\n" || char === "\r") && !inQuotes) {
      if (field || row.length) {
        row.push(field);
        result.push(row);
        row = [];
        field = "";
      }
      if (char === "\r" && next === "\n") i++;
    } else {
      field += char;
    }
  }

  if (field || row.length) {
    row.push(field);
    result.push(row);
  }

  return result;
}

function normalizeDate(value) {
  if (!value) return "";

  const d = new Date(value);
  if (!isNaN(d)) return d.toISOString().slice(0, 10);

  const parts = value.trim().split(/[\/\-]/);
  if (parts.length === 3) {
    let [m, day, y] = parts;
    if (y.length === 2) y = "20" + y;
    return `${y.padStart(4, "0")}-${m.padStart(2, "0")}-${day.padStart(2, "0")}`;
  }

  return value.trim();
}

function displayDate(iso) {
  const d = new Date(iso + "T12:00:00");
  if (isNaN(d)) return iso || "No date selected";

  return d.toLocaleDateString(undefined, {
    weekday: "long",
    month: "long",
    day: "numeric",
    year: "numeric"
  });
}

function todayISO() {
  const now = new Date();
  const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000);
  return local.toISOString().slice(0, 10);
}

function clean(value) {
  return value && value.trim() ? value.trim() : "";
}

function escapeHTML(str) {
  return String(str || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}

function listify(text) {
  const value = clean(text);
  if (!value) return `<span class="empty">Nothing listed.</span>`;

  const parts = value
    .split(/\n|•|;|\u2022/)
    .map(x => x.trim())
    .filter(Boolean);

  if (parts.length <= 1) return `<div class="content-text">${escapeHTML(value)}</div>`;

  return `<ul class="agenda-list">${parts.map(x => `<li>${escapeHTML(x)}</li>`).join("")}</ul>`;
}

function safeText(value, fallback = "Nothing listed.") {
  return clean(value) ? escapeHTML(value) : `<span class="empty">${fallback}</span>`;
}

function courseRows() {
  return rows.sort((a, b) => a._date.localeCompare(b._date));
}

function findAgenda() {
  return rows.find(r => r._date === currentDate) || null;
}

function findQuote() {
  if (!quoteRows.length) return "";

  const exact = quoteRows.find(r => r._date === currentDate);
  if (exact) return exact.quote;

  const before = quoteRows.filter(r => r._date <= currentDate);
  if (before.length) return before[before.length - 1].quote;

  return quoteRows[quoteRows.length - 1].quote;
}

function nearestAgenda() {
  if (!rows.length) return null;
  const today = todayISO();
  return rows.find(r => r._date === today) || rows[rows.length - 1];
}

function shiftDate(direction) {
  const filtered = courseRows();
  const dates = filtered.map(r => r._date);
  const index = dates.indexOf(currentDate);

  if (index === -1) {
    const current = new Date(currentDate + "T12:00:00");
    current.setDate(current.getDate() + direction);
    currentDate = current.toISOString().slice(0, 10);
  } else {
    const nextIndex = Math.min(Math.max(index + direction, 0), dates.length - 1);
    currentDate = dates[nextIndex];
  }

  els.datePicker.value = currentDate;
  render();
}

function render() {
  const agenda = findAgenda();
  const quote = findQuote();

  els.dateBadge.textContent = displayDate(currentDate);
  els.courseBadge.textContent = courseName(currentCourse);
  els.lessonBadge.textContent = agenda ? (agenda["Lesson Title"] || "Lesson") : "No agenda found";

  if (!agenda) {
    els.app.className = "card fade";
    els.app.innerHTML = `
      <div class="card-header yellow"><h2>No Agenda Found</h2></div>
      <div class="card-body">
        <p class="content-text">There is no agenda listed for ${escapeHTML(courseName(currentCourse))} on ${escapeHTML(displayDate(currentDate))}.</p>
        <div style="margin-top:12px;" class="quote-text">${escapeHTML(quote || "No quote listed for this date.")}</div>
      </div>
    `;
    return;
  }

  els.app.className = "main-grid fade";
  els.app.innerHTML = `
    <div class="left-stack">
      <div class="card agenda-card">
        <div class="card-header">
          <h2>Class Agenda</h2>
          <span>${escapeHTML(displayDate(agenda._date))}</span>
        </div>
        <div class="card-body">
          <div class="meta-table">
            <div class="meta-row">
              <div class="meta-label">Course</div>
              <div class="meta-value">${escapeHTML(courseName(currentCourse))}</div>
            </div>
            <div class="meta-row">
              <div class="meta-label">Lesson</div>
              <div class="meta-value">${safeText(agenda["Lesson Title"], "No lesson listed.")}</div>
            </div>
            <div class="meta-row agenda-row">
              <div class="meta-label">Agenda</div>
              <div>${listify(agenda.Agenda)}</div>
            </div>
            <div class="meta-row">
              <div class="meta-label">Homework</div>
              <div class="content-text">${safeText(agenda.Homework, "No homework listed.")}</div>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header yellow"><h3>Important Announcements</h3></div>
        <div class="card-body">${listify(agenda["Important Announcements"])}</div>
      </div>
    </div>

    <div class="side-grid">
      <div class="card">
        <div class="card-header quote-header"><h3>Quote of the Day</h3></div>
        <div class="card-body">
          <div class="quote-text">${escapeHTML(quote || "No quote listed for this date.")}</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header green"><h3>Objectives</h3></div>
        <div class="card-body">${listify(agenda.Objectives)}</div>
      </div>

      <div class="card">
        <div class="card-header"><h3>Standards</h3></div>
        <div class="card-body">${listify(agenda.Standards)}</div>
      </div>
    </div>
  `;
}

async function loadQuotes() {
  try {
    const res = await fetch(quotesCsvUrl);
    const text = await res.text();
    const parsed = parseCSV(text).filter(r => r.some(cell => cell.trim() !== ""));

    quoteRows = parsed.slice(1).map(row => ({
      _date: normalizeDate(row[0] || ""),
      quote: row[1] || ""
    })).filter(r => r._date && r.quote).sort((a, b) => a._date.localeCompare(b._date));
  } catch (err) {
    console.error("Quotes could not load", err);
    quoteRows = [];
  }
}

async function loadAgendaForCourse(course) {
  try {
    setTheme(course);
    currentCourse = course;
    els.app.className = "loading";
    els.app.textContent = `Loading ${courseName(course)} agenda...`;

    const res = await fetch(csvUrls[course]);
    const text = await res.text();

    const parsed = parseCSV(text).filter(r => r.some(cell => cell.trim() !== ""));
    const headers = parsed[0].map(h => h.trim());

    rows = parsed.slice(1).map(row => {
      const obj = {};
      headers.forEach((h, i) => obj[h] = row[i] || "");
      obj._date = normalizeDate(obj.Date);
      return obj;
    }).filter(r => r._date).sort((a, b) => a._date.localeCompare(b._date));

    currentDate = todayISO();
    els.datePicker.value = currentDate;

    render();
  } catch (err) {
    console.error(err);
    els.app.className = "card";
    els.app.innerHTML = `
      <div class="card-header yellow"><h2>Agenda Could Not Load</h2></div>
      <div class="card-body">
        <p class="content-text">Check that the Google Sheet is published as a CSV and that the link is correct.</p>
      </div>
    `;
  }
}

els.courseSelect.addEventListener("change", () => {
  loadAgendaForCourse(els.courseSelect.value);
});

els.datePicker.addEventListener("change", () => {
  currentDate = els.datePicker.value;
  render();
});

els.prevBtn.addEventListener("click", () => shiftDate(-1));
els.nextBtn.addEventListener("click", () => shiftDate(1));

els.todayBtn.addEventListener("click", () => {
  currentDate = todayISO();
  els.datePicker.value = currentDate;
  render();
});

(async function init() {
  await loadQuotes();
  await loadAgendaForCourse("IED");
})();
</script>
</body>
</html>
