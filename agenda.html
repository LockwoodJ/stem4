<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lockwood STEM | Daily Agenda</title>

<style>
:root {
  --blue: #003399;
  --blue2: #0054c8;
  --green: #33cc66;
  --yellow: #ffcc00;
  --light: #f5f5f5;
  --dark: #101827;
  --text: #1f2937;
  --muted: #667085;
  --white: #ffffff;
  --shadow: 0 24px 70px rgba(0, 51, 153, 0.16);
  --soft: 0 14px 38px rgba(17, 24, 39, 0.08);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at top left, rgba(51, 204, 102, 0.18), transparent 32%),
    radial-gradient(circle at top right, rgba(0, 51, 153, 0.18), transparent 34%),
    linear-gradient(180deg, #ffffff 0%, #f6f9ff 55%, var(--light) 100%);
  min-height: 100vh;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0, 51, 153, 0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 51, 153, 0.04) 1px, transparent 1px);
  background-size: 44px 44px;
  pointer-events: none;
  z-index: -1;
  mask-image: linear-gradient(to bottom, rgba(0,0,0,0.75), transparent 80%);
}

.page {
  max-width: 1180px;
  margin: 0 auto;
  padding: 24px;
}

.hero {
  border-radius: 36px;
  padding: 34px;
  background:
    linear-gradient(135deg, rgba(255,255,255,.82), rgba(255,255,255,.48)),
    radial-gradient(circle at 86% 14%, rgba(51,204,102,.18), transparent 26%),
    radial-gradient(circle at 12% 18%, rgba(255,204,0,.18), transparent 24%);
  border: 1px solid rgba(255,255,255,.88);
  box-shadow: var(--shadow);
  margin-bottom: 22px;
}

.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  padding: 9px 15px;
  border-radius: 999px;
  background: rgba(255,255,255,.78);
  border: 1px solid rgba(51,204,102,.35);
  color: #176b38;
  font-size: .88rem;
  font-weight: 900;
  box-shadow: 0 10px 26px rgba(17,24,39,.06);
  margin-bottom: 16px;
}

.spark {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--yellow);
  box-shadow: 0 0 0 5px rgba(255,204,0,.25);
}

h1 {
  font-size: clamp(2.6rem, 6vw, 5.4rem);
  line-height: .92;
  letter-spacing: -.08em;
  color: var(--dark);
  margin: 0 0 12px;
}

h1 span {
  color: var(--blue);
}

.subtitle {
  color: var(--muted);
  font-size: 1.12rem;
  line-height: 1.55;
  max-width: 780px;
  margin: 0;
}

.controls {
  display: grid;
  grid-template-columns: 1fr auto auto auto;
  gap: 12px;
  align-items: center;
  margin-top: 24px;
}

.select-wrap,
.date-wrap {
  background: rgba(255,255,255,.86);
  border: 1px solid rgba(255,255,255,.92);
  border-radius: 18px;
  padding: 10px 12px;
  box-shadow: var(--soft);
}

label {
  display: block;
  color: var(--muted);
  font-size: .75rem;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: .05em;
  margin-bottom: 4px;
}

select,
input[type="date"] {
  width: 100%;
  border: none;
  outline: none;
  background: transparent;
  color: var(--dark);
  font-size: 1rem;
  font-weight: 800;
}

button {
  cursor: pointer;
  border: none;
  border-radius: 999px;
  padding: 14px 18px;
  font-weight: 900;
  background: white;
  color: var(--blue);
  box-shadow: var(--soft);
  transition: transform .18s ease, box-shadow .18s ease;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}

button.primary {
  background: linear-gradient(135deg, var(--blue), var(--blue2));
  color: white;
}

.status-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin: 18px 0 0;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  border-radius: 999px;
  padding: 8px 12px;
  background: rgba(255,255,255,.78);
  border: 1px solid rgba(255,255,255,.86);
  font-size: .85rem;
  font-weight: 900;
  color: var(--dark);
  box-shadow: 0 8px 18px rgba(17,24,39,.04);
}

.badge::before {
  content: "";
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 0 3px rgba(51,204,102,.18);
}

.main-grid {
  display: grid;
  grid-template-columns: 1.08fr .92fr;
  gap: 20px;
}

.card {
  background: rgba(255,255,255,.86);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,.9);
  border-radius: 28px;
  box-shadow: var(--soft);
  overflow: hidden;
}

.card-header {
  padding: 16px 20px;
  background: linear-gradient(135deg, var(--blue), #001f66);
  color: white;
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: center;
}

.card-header.green {
  background: linear-gradient(135deg, var(--green), #1f9f52);
  color: #07111f;
}

.card-header.yellow {
  background: linear-gradient(135deg, var(--yellow), #f2b400);
  color: #211800;
}

.card h2,
.card h3 {
  margin: 0;
  letter-spacing: -.03em;
}

.card-body {
  padding: 22px;
}

.meta-table {
  display: grid;
  gap: 10px;
}

.meta-row {
  display: grid;
  grid-template-columns: 120px 1fr;
  gap: 14px;
  padding: 12px;
  border-radius: 16px;
  background: rgba(0,51,153,.045);
}

.meta-label {
  color: var(--blue);
  font-weight: 900;
}

.meta-value {
  color: var(--dark);
  font-weight: 800;
}

.content-text {
  white-space: pre-wrap;
  color: var(--text);
  font-size: 1.03rem;
  line-height: 1.6;
}

.agenda-list {
  margin: 0;
  padding-left: 18px;
}

.agenda-list li {
  margin: 8px 0;
}

.side-grid {
  display: grid;
  gap: 20px;
}

.quote {
  font-size: 1.08rem;
  line-height: 1.55;
  font-style: italic;
  color: var(--dark);
}

.empty {
  color: var(--muted);
  font-style: italic;
}

.loading {
  padding: 30px;
  text-align: center;
  color: var(--muted);
  font-weight: 900;
}

.fade {
  animation: fadeIn .35s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@media(max-width: 900px) {
  .controls,
  .main-grid {
    grid-template-columns: 1fr;
  }

  .hero {
    padding: 26px 20px;
    border-radius: 28px;
  }

  .meta-row {
    grid-template-columns: 1fr;
  }
}

@media(max-width: 600px) {
  .page {
    padding: 14px;
  }

  button {
    width: 100%;
  }

  .status-row {
    flex-direction: column;
  }
}
</style>
</head>

<body>
<div class="page">
  <section class="hero">
    <div class="eyebrow"><span class="spark"></span> Lockwood STEM</div>
    <h1>Daily <span>Agenda</span></h1>
    <p class="subtitle">Select your course, move between dates, and check what you need to complete today.</p>

    <div class="controls">
      <div class="select-wrap">
        <label for="courseSelect">Course</label>
        <select id="courseSelect"></select>
      </div>

      <div class="date-wrap">
        <label for="datePicker">Date</label>
        <input id="datePicker" type="date" />
      </div>

      <button id="prevBtn">◀ Previous</button>
      <button id="todayBtn" class="primary">Today</button>
      <button id="nextBtn">Next ▶</button>
    </div>

    <div class="status-row">
      <div class="badge" id="dateBadge">Loading date...</div>
      <div class="badge" id="courseBadge">Loading course...</div>
      <div class="badge" id="lessonBadge">Loading lesson...</div>
    </div>
  </section>

  <div id="app" class="loading">Loading agenda...</div>
</div>

<script>
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS4L3J5287xZ94Awc47kSrjAKOUIenbvYYlt15zdUAM4oL7Z_nVNegZ8M84JiKfrCr2x4FATCDS81Ng/pub?gid=1181780759&single=true&output=csv";

let rows = [];
let currentCourse = "";
let currentDate = "";

const els = {
  app: document.getElementById("app"),
  courseSelect: document.getElementById("courseSelect"),
  datePicker: document.getElementById("datePicker"),
  prevBtn: document.getElementById("prevBtn"),
  todayBtn: document.getElementById("todayBtn"),
  nextBtn: document.getElementById("nextBtn"),
  dateBadge: document.getElementById("dateBadge"),
  courseBadge: document.getElementById("courseBadge"),
  lessonBadge: document.getElementById("lessonBadge")
};

function parseCSV(text) {
  const result = [];
  let row = [];
  let field = "";
  let inQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const char = text[i];
    const next = text[i + 1];

    if (char === '"' && inQuotes && next === '"') {
      field += '"';
      i++;
    } else if (char === '"') {
      inQuotes = !inQuotes;
    } else if (char === "," && !inQuotes) {
      row.push(field);
      field = "";
    } else if ((char === "\n" || char === "\r") && !inQuotes) {
      if (field || row.length) {
        row.push(field);
        result.push(row);
        row = [];
        field = "";
      }
      if (char === "\r" && next === "\n") i++;
    } else {
      field += char;
    }
  }

  if (field || row.length) {
    row.push(field);
    result.push(row);
  }

  return result;
}

function normalizeDate(value) {
  if (!value) return "";
  const d = new Date(value);
  if (!isNaN(d)) return d.toISOString().slice(0, 10);

  const parts = value.trim().split(/[\/\-]/);
  if (parts.length === 3) {
    let [m, day, y] = parts;
    if (y.length === 2) y = "20" + y;
    return `${y.padStart(4, "0")}-${m.padStart(2, "0")}-${day.padStart(2, "0")}`;
  }

  return value.trim();
}

function displayDate(iso) {
  const d = new Date(iso + "T12:00:00");
  if (isNaN(d)) return iso || "No date selected";
  return d.toLocaleDateString(undefined, {
    weekday: "long",
    month: "long",
    day: "numeric",
    year: "numeric"
  });
}

function todayISO() {
  return new Date().toISOString().slice(0, 10);
}

function clean(value) {
  return value && value.trim() ? value.trim() : "";
}

function safe(value, fallback = "Nothing listed.") {
  return clean(value) || `<span class="empty">${fallback}</span>`;
}

function listify(text) {
  const value = clean(text);
  if (!value) return `<span class="empty">Nothing listed.</span>`;

  const parts = value
    .split(/\n|•|;|\u2022/)
    .map(x => x.trim())
    .filter(Boolean);

  if (parts.length <= 1) return `<div class="content-text">${escapeHTML(value)}</div>`;

  return `<ul class="agenda-list">${parts.map(x => `<li>${escapeHTML(x)}</li>`).join("")}</ul>`;
}

function escapeHTML(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}

function getCourses() {
  return [...new Set(rows.map(r => r.Course).filter(Boolean))].sort();
}

function courseRows() {
  return rows
    .filter(r => r.Course === currentCourse)
    .sort((a, b) => a._date.localeCompare(b._date));
}

function findAgenda() {
  const filtered = courseRows();
  return filtered.find(r => r._date === currentDate) || null;
}

function nearestAgenda() {
  const filtered = courseRows();
  if (!filtered.length) return null;

  const today = todayISO();
  return filtered.find(r => r._date === today) || filtered[filtered.length - 1];
}

function shiftDate(direction) {
  const filtered = courseRows();
  const dates = filtered.map(r => r._date);
  const index = dates.indexOf(currentDate);

  if (index === -1) {
    const nearest = nearestAgenda();
    if (nearest) currentDate = nearest._date;
  } else {
    const nextIndex = Math.min(Math.max(index + direction, 0), dates.length - 1);
    currentDate = dates[nextIndex];
  }

  els.datePicker.value = currentDate;
  render();
}

function render() {
  const agenda = findAgenda();

  els.dateBadge.textContent = displayDate(currentDate);
  els.courseBadge.textContent = currentCourse || "No course selected";
  els.lessonBadge.textContent = agenda ? (agenda["Lesson Title"] || "Lesson") : "No agenda found";

  if (!agenda) {
    els.app.className = "card fade";
    els.app.innerHTML = `
      <div class="card-header yellow"><h2>No Agenda Found</h2></div>
      <div class="card-body">
        <p class="content-text">There is no agenda listed for ${escapeHTML(currentCourse)} on ${escapeHTML(displayDate(currentDate))}.</p>
      </div>
    `;
    return;
  }

  els.app.className = "main-grid fade";
  els.app.innerHTML = `
    <div class="card">
      <div class="card-header">
        <h2>Class Agenda</h2>
        <span>${escapeHTML(displayDate(agenda._date))}</span>
      </div>
      <div class="card-body">
        <div class="meta-table">
          <div class="meta-row">
            <div class="meta-label">Course</div>
            <div class="meta-value">${escapeHTML(agenda.Course)}</div>
          </div>
          <div class="meta-row">
            <div class="meta-label">Unit</div>
            <div class="meta-value">${escapeHTML(safe(agenda.Unit, "No unit listed.")).replaceAll("&lt;span", "<span").replaceAll("&lt;/span&gt;", "</span>")}</div>
          </div>
          <div class="meta-row">
            <div class="meta-label">Lesson</div>
            <div class="meta-value">${escapeHTML(safe(agenda["Lesson Title"], "No lesson listed.")).replaceAll("&lt;span", "<span").replaceAll("&lt;/span&gt;", "</span>")}</div>
          </div>
          <div class="meta-row">
            <div class="meta-label">Agenda</div>
            <div>${listify(agenda.Agenda)}</div>
          </div>
          <div class="meta-row">
            <div class="meta-label">Homework</div>
            <div class="content-text">${safe(escapeHTML(agenda.Homework), "No homework listed.")}</div>
          </div>
        </div>
      </div>
    </div>

    <div class="side-grid">
      <div class="card">
        <div class="card-header green"><h3>Objectives</h3></div>
        <div class="card-body">${listify(agenda.Objectives)}</div>
      </div>

      <div class="card">
        <div class="card-header yellow"><h3>Important Announcements</h3></div>
        <div class="card-body">${listify(agenda["Important Announcements"])}</div>
      </div>

      <div class="card">
        <div class="card-header"><h3>Standards</h3></div>
        <div class="card-body">${listify(agenda.Standards)}</div>
      </div>
    </div>
  `;
}

async function loadAgenda() {
  try {
    const res = await fetch(csvUrl);
    const text = await res.text();
    const parsed = parseCSV(text).filter(r => r.some(cell => cell.trim() !== ""));
    const headers = parsed[0].map(h => h.trim());

    rows = parsed.slice(1).map(row => {
      const obj = {};
      headers.forEach((h, i) => obj[h] = row[i] || "");
      obj._date = normalizeDate(obj.Date);
      return obj;
    }).filter(r => r._date && r.Course);

    const courses = getCourses();

    els.courseSelect.innerHTML = courses
      .map(course => `<option value="${escapeHTML(course)}">${escapeHTML(course)}</option>`)
      .join("");

    currentCourse = courses.includes("IED") ? "IED" : courses[0];

    els.courseSelect.value = currentCourse;

    const initial = nearestAgenda();
    currentDate = initial ? initial._date : todayISO();
    els.datePicker.value = currentDate;

    render();
  } catch (err) {
    console.error(err);
    els.app.className = "card";
    els.app.innerHTML = `
      <div class="card-header yellow"><h2>Agenda Could Not Load</h2></div>
      <div class="card-body">
        <p class="content-text">Check that the Google Sheet is published as a CSV and that the link is correct.</p>
      </div>
    `;
  }
}

els.courseSelect.addEventListener("change", () => {
  currentCourse = els.courseSelect.value;
  const initial = nearestAgenda();
  currentDate = initial ? initial._date : todayISO();
  els.datePicker.value = currentDate;
  render();
});

els.datePicker.addEventListener("change", () => {
  currentDate = els.datePicker.value;
  render();
});

els.prevBtn.addEventListener("click", () => shiftDate(-1));
els.nextBtn.addEventListener("click", () => shiftDate(1));
els.todayBtn.addEventListener("click", () => {
  currentDate = todayISO();
  els.datePicker.value = currentDate;
  render();
});

loadAgenda();
</script>
</body>
</html>
